{% extends 'jobs/base.html' %}
{% block title %}Login - HireAspire{% endblock %}
{% block content %}
<div class="container" style="max-width:440px; margin-top:60px;">
    <div class="card p-4">
        <h3 class="mb-4 fw-bold"><i class="bi bi-box-arrow-in-right text-danger"></i> Login</h3>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                       class="form-control {% if field.errors %}is-invalid{% endif %}">
                {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3 text-muted">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
